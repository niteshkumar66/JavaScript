<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur Code</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLanguage (langName) {
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage('Python')
    addLanguage('Typescript')

    function addOptLang (langName) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(`${langName}`))
        document.querySelector('.language').appendChild(li)
    }
    addOptLang('golang')

    // EDIT 
    const secLang = document.querySelector('li:nth-child(2)')
    // console.log(secLang);
    // secLang.innerHTML = 'Mojo'
    const newLi = document.createElement('li')
    // newLi.textContent = 'Mojo'
    newLi.appendChild(document.createTextNode('Mojo'))
    secLang.replaceWith(newLi)

    //edit 
    const firstLang = document.querySelector('li:nth-child(1)')
    console.log(firstLang);
    const anotherLi = document.createElement('li')
    anotherLi.appendChild(document.createTextNode('Chai aur Code'))
    firstLang.outerHTML = '<li>Typescript</li>' 
    
    // Remove 
    const lastLand = document.querySelector('li:last-child')
    lastLand.remove()
</script>
</html>
